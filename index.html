`<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>時光膠卷・精選集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;color:#F4ECDD;font-family:"PingFang TC","Microsoft JhengHei",sans-serif;min-height:100vh}
header{background:#2d2010;padding:14px 16px;text-align:center;border-bottom:1px solid #4a3520}
header h1{font-size:20px;letter-spacing:3px;color:#F4ECDD}
header p{font-size:11px;color:#8a7c64;margin-top:4px}
.tabs{display:flex;background:#2d2010;border-bottom:1px solid #4a3520;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:13px 4px;text-align:center;font-size:14px;cursor:pointer;color:#8a7c64;border:none;background:none;transition:.2s;letter-spacing:1px}
.tab.active{color:#F4ECDD;border-bottom:2px solid #E8943A;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;min-height:60vh}
@media(min-width:600px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(5,1fr)}}
.cell{aspect-ratio:1;overflow:hidden;cursor:pointer;background:#2d2010;position:relative}
.cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;opacity:0;transition:opacity .4s,transform .3s}
.cell img.loaded{opacity:1}
.cell:hover img,.cell:active img{transform:scale(1.05)}
.cell .cap{position:absolute;bottom:0;left:0;right:0;padding:18px 6px 5px;background:linear-gradient(transparent,rgba(0,0,0,.6));color:#F4ECDD;font-size:10px;opacity:0;transition:opacity .2s}
.cell:hover .cap{opacity:1}
.empty{text-align:center;padding:80px 20px;color:#8a7c64;font-size:14px;grid-column:1/-1}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:100;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
#lb.show{display:flex}
#lbWrap{position:relative;width:100%;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lbImg{max-width:100%;max-height:82vh;object-fit:contain;display:block;transition:opacity .2s}
#lbCaption{color:rgba(255,255,255,.7);font-size:12px;padding:8px 16px 14px;text-align:center;min-height:32px}
#lbClose{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center}
#lbPrev,#lbNext{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:24px;width:40px;height:64px;cursor:pointer;border-radius:8px;z-index:5;display:flex;align-items:center;justify-content:center}
#lbPrev{left:8px}#lbNext{right:8px}
#lbCounter{position:absolute;top:14px;left:16px;color:rgba(255,255,255,.55);font-size:11px;font-family:monospace}
</style>
</head>
<body>
<header>
  <h1>📷 時光膠卷・精選集</h1>
  <p id="updTime">載入中...</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="showCat('姊姊',this)">👧 姊姊</button>
  <button class="tab" onclick="showCat('妹妹',this)">👧 妹妹</button>
  <button class="tab" onclick="showCat('全家',this)">👨‍👩‍👧‍👧 全家</button>
</div>
<div class="grid" id="grid"></div>
<div id="lb">
  <div id="lbCounter"></div>
  <button id="lbClose" onclick="closeLB()">✕</button>
  <div id="lbWrap">
    <button id="lbPrev" onclick="stepLB(-1)">‹</button>
    <img id="lbImg" src="" alt="">
    <button id="lbNext" onclick="stepLB(1)">›</button>
  </div>
  <div id="lbCaption"></div>
</div>
<script>
var M={},cur='姊姊',lbIdx=0;
fetch('./manifest.json?t='+Date.now())
  .then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(m){
    M=m;
    document.getElementById('updTime').textContent='最後更新：'+(m.updated||'');
    showCat('姊姊',document.querySelector('.tab'));
  })
  .catch(function(e){
    document.getElementById('updTime').textContent='載入失敗：'+e.message;
    document.getElementById('grid').innerHTML='<div class="empty">⚠️ 尚未同步照片或網路異常</div>';
  });

function showCat(cat,btn){
  cur=cat;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  var items=(M.categories&&M.categories[cat])||[];
  var g=document.getElementById('grid');
  if(!items.length){
    g.innerHTML='<div class="empty">尚無 '+cat+' 的精選照片</div>';
    return;
  }
  g.innerHTML=items.map(function(it,i){
    var capText=(it.date||'')+(it.title?' · '+it.title:'');
    return '<div class="cell" onclick="openLB('+i+')">'
      +'<img src="./photos/'+it.file+'" loading="lazy" alt="'+(it.title||'')+'" onload="this.style.opacity=1" style="opacity:0;transition:opacity .4s">'+
      +(capText?'<div class="cap">'+capText+'</div>':'')
      +'</div>';
  }).join('');
}

function openLB(i){
  lbIdx=i;
  renderLB();
  document.getElementById('lb').classList.add('show');
}
function closeLB(){document.getElementById('lb').classList.remove('show');}
function stepLB(dir){
  var items=(M.categories&&M.categories[cur])||[];
  lbIdx=(lbIdx+dir+items.length)%items.length;
  renderLB();
}
function renderLB(){
  var items=(M.categories&&M.categories[cur])||[];
  var it=items[lbIdx];if(!it)return;
  var img=document.getElementById('lbImg');
  img.style.opacity='0';
  img.onload=function(){img.style.opacity='1';};
  img.src='./photos/'+it.file;
  document.getElementById('lbCaption').textContent=(it.date||'')+(it.title?' · '+it.title:'');
  document.getElementById('lbCounter').textContent=(lbIdx+1)+' / '+items.length;
}
document.getElementById('lb').addEventListener('click',function(e){
  if(e.target===this||e.target===document.getElementById('lbWrap'))closeLB();
});
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb').classList.contains('show'))return;
  if(e.key==='ArrowLeft')stepLB(-1);
  else if(e.key==='ArrowRight')stepLB(1);
  else if(e.key==='Escape')closeLB();
});
// 手機左右滑動
var _tx=0;
document.getElementById('lb').addEventListener('touchstart',function(e){_tx=e.touches[0].clientX;},{passive:true});
document.getElementById('lb').addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)>50)stepLB(dx<0?1:-1);
});
</script>
</body>
</html>
